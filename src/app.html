<!doctype html>
<html lang="de">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
		<meta name="theme-color" content="#000000" />
		<meta name="apple-mobile-web-app-capable" content="yes" />
		<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
		<link rel="icon" type="image/png" href="%sveltekit.assets%/favicon.png" />
		<link rel="apple-touch-icon" href="%sveltekit.assets%/apple-touch-icon.png" />
		<!-- iPhone SE, 8 -->
		<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-750x1334.png" />
		<!-- iPhone 8 Plus -->
		<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 736px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1242x2208.png" />
		<!-- iPhone X, XS, 11 Pro, 12 mini, 13 mini -->
		<link rel="apple-touch-startup-image" media="(device-width: 375px) and (device-height: 812px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1125x2436.png" />
		<!-- iPhone XR, 11 -->
		<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-828x1792.png" />
		<!-- iPhone XS Max, 11 Pro Max -->
		<link rel="apple-touch-startup-image" media="(device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1242x2688.png" />
		<!-- iPhone 12, 12 Pro, 13, 13 Pro, 14 -->
		<link rel="apple-touch-startup-image" media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1170x2532.png" />
		<!-- iPhone 12 Pro Max, 13 Pro Max, 14 Plus -->
		<link rel="apple-touch-startup-image" media="(device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1284x2778.png" />
		<!-- iPhone 14 Pro, 15, 15 Pro, 16 -->
		<link rel="apple-touch-startup-image" media="(device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1179x2556.png" />
		<!-- iPhone 14 Pro Max, 15 Plus, 16 Plus -->
		<link rel="apple-touch-startup-image" media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1290x2796.png" />
		<!-- iPhone 16 Pro -->
		<link rel="apple-touch-startup-image" media="(device-width: 402px) and (device-height: 874px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1206x2622.png" />
		<!-- iPhone 16 Pro Max -->
		<link rel="apple-touch-startup-image" media="(device-width: 440px) and (device-height: 956px) and (-webkit-device-pixel-ratio: 3)" href="%sveltekit.assets%/splash/splash-1320x2868.png" />
		<!-- iPad mini -->
		<link rel="apple-touch-startup-image" media="(device-width: 768px) and (device-height: 1024px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-1536x2048.png" />
		<!-- iPad Air, iPad 10th gen -->
		<link rel="apple-touch-startup-image" media="(device-width: 820px) and (device-height: 1180px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-1640x2360.png" />
		<!-- iPad Pro 11" -->
		<link rel="apple-touch-startup-image" media="(device-width: 834px) and (device-height: 1194px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-1668x2388.png" />
		<!-- iPad Pro 12.9" -->
		<link rel="apple-touch-startup-image" media="(device-width: 1024px) and (device-height: 1366px) and (-webkit-device-pixel-ratio: 2)" href="%sveltekit.assets%/splash/splash-2048x2732.png" />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<script>
			(function() {
				var theme = localStorage.getItem('fittrack-theme') || 'system';
				var isDark = theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches);
				if (isDark) document.documentElement.classList.add('dark');
			})();
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
